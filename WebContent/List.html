<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Types of Lists</title>
</head>
<body>
	<p>
	<h1>This is Example of List</h1>
	</p>
	<u><h1>UnOrder list => ul</h1></u>
	<ul style="list-style-type: disc;">
		<li>Mahesh</li>
		<li>Ramesh</li>
		<li>Suresh</li>
	</ul>
	<br>
	<u><h1>Order list => ul</h1></u>
	<ol >
		<li>Mahesh</li>
		<li>Ramesh</li>
		<li>Suresh</li>
	</ol>
	<ol reversed>
		<li>Mahesh</li>
		<li>Ramesh</li>
		<li>Suresh</li>
	</ol>
		<u><h1>Discription list => ul</h1></u>
		<dl>
		<dt>India</dt><!--discription term  -->
		<dd>Is Greate Country</dd>
		</dl>
		<p>
		<ul>
		<li>Coffee</li>
		<ol>
		<li>Black Coffee</li>
		<li>Cold Coffee</li>
		</ol>
		</ul>
		</p>
		
</body>
</html>
